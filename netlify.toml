# --- CORRECTED FILE: netlify.toml ---
[build]
  # The base directory is the root of your monorepo.
  base = "/"
  # The publish directory for the final build artifacts.
  # CORRECTED: The path must include the 'workspaces' directory for the frontend build output.
  publish = "workspaces/frontend/dist"
  # This command is now simple and correct. It relies on the root package.json's build script,
  # which correctly builds all workspaces in the right order.
  command = "npm run build"

[build.environment]
  # Specify the Node.js version to match your local and Firebase environments.
  NODE_VERSION = "20"

# Rewrite rule for the Single-Page Application.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200